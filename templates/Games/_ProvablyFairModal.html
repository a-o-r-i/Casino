<section
  class="pointer-events-none fixed inset-0 z-50 flex items-center justify-center overflow-y-auto px-4 py-10 opacity-0"
  data-modal="{{ fairness_modal_id }}"
>
  <div
    class="absolute inset-0 bg-black/0"
    data-close-modal
    data-modal-overlay
  ></div>

  <section
    class="relative z-10 w-full max-w-[460px] translate-y-6 scale-[0.96] rounded-[8px] border border-white/10 bg-[#07090e] p-6 opacity-0 shadow-[0_24px_80px_rgba(0,0,0,0.52)]"
    data-modal-panel
    role="dialog"
    aria-modal="true"
    aria-labelledby="{{ fairness_modal_id }}-title"
  >
    <div class="flex items-start justify-between gap-4">
      <h2 class="text-2xl font-semibold tracking-[-0.04em] text-white" id="{{ fairness_modal_id }}-title">Provably Fair</h2>
      <button
        class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-[8px] border border-white/10 bg-white/[0.04] text-white/58 transition hover:bg-white/10 hover:text-white"
        data-close-modal
        type="button"
        aria-label="Close provably fair modal"
      >
        <svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8" aria-hidden="true">
          <path d="m5 5 10 10"></path>
          <path d="M15 5 5 15"></path>
        </svg>
      </button>
    </div>

    <div class="mt-6 grid grid-cols-2 border-b border-white/10 text-sm font-semibold">
      <span class="border-b-2 border-violet-500 pb-3 text-center text-violet-300">Seeds</span>
      <span class="pb-3 text-center text-white/72">Verify</span>
    </div>

    <div class="mt-6 space-y-5 text-sm">
      <div>
        <p class="mb-2 font-semibold text-white">Server seed hash</p>
        <div class="break-all rounded-[8px] border border-white/10 bg-white/[0.03] px-4 py-3 font-mono text-xs leading-6 text-white/72" data-fairness-seed-hash>{{ fairness_state.server_seed_hash }}</div>
      </div>

      <div>
        <p class="mb-2 font-semibold text-white">Nonce</p>
        <div class="rounded-[8px] border border-white/10 bg-white/[0.03] px-4 py-3 font-mono text-sm text-white/72" data-fairness-nonce>{{ fairness_state.nonce }}</div>
      </div>

      <div class="{% if not fairness_state.server_seed %}hidden{% endif %}" data-fairness-seed-row>
        <p class="mb-2 font-semibold text-white">Revealed server seed</p>
        <div class="break-all rounded-[8px] border border-white/10 bg-white/[0.03] px-4 py-3 font-mono text-xs leading-6 text-white/72" data-fairness-seed>{{ fairness_state.server_seed or "" }}</div>
      </div>

      <p class="rounded-[8px] border border-white/8 bg-white/[0.025] px-4 py-3 text-sm leading-6 text-white/48 {% if fairness_state.server_seed %}hidden{% endif %}" data-fairness-pending>
        Server seed reveals after the result.
      </p>
    </div>
  </section>
</section>
