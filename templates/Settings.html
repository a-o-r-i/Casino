{% extends "Base.html" %}

{% block title %}Shuffling | Settings{% endblock %}
{% block page_key %}settings{% endblock %}

{% block content %}
  <section class="mx-auto w-full max-w-[760px] px-4 py-8 md:px-6">
    <div class="rounded-[8px] border border-white/8 bg-[#07090e] p-6" data-route-card>
      <h1 class="text-4xl font-semibold tracking-[-0.05em] text-white">Settings</h1>

      <section class="mt-6 rounded-[8px] border border-white/8 bg-white/[0.03] p-5" data-sound-control>
        <div class="flex items-center justify-between gap-4">
          <div>
            <h2 class="text-xl font-semibold tracking-[-0.04em] text-white">Audio volume</h2>
          </div>
          <span class="shrink-0 text-xs font-semibold text-white/72" data-sound-volume-value>100%</span>
        </div>

        <div data-sound-slider-row>
          <svg data-sound-slider-icon viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" aria-hidden="true">
            <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
            <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
            <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
          </svg>
          <input
            aria-label="Game audio volume"
            data-sound-volume-input
            max="100"
            min="0"
            step="1"
            type="range"
            value="100"
          >
        </div>
      </section>
    </div>
  </section>
{% endblock %}
